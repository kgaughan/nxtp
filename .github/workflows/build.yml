---
name: Build

on:
  push:
    branches-ignore:
      - master
      - main
    tags-ignore:
      - "*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: extractions/setup-just@v4
        with:
          just-version: 1.40.0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Test
        run: just tests

      - name: Build
        run: just build
